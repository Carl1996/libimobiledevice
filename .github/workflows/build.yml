name: Build libimobiledevice + All Deps (Universal macOS 12+)

on:
  workflow_dispatch:  # е…Ѓи®ёж‰‹еЉЁз‚№жЊ‰й’®иїђиЎЊ

jobs:
  build:
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install autoconf automake libtool pkg-config openssl@3

      - name: Build all dependencies + universal binaries
        run: |
          set -e
          export MACOSX_DEPLOYMENT_TARGET=12.0
          export PREFIX=$(pwd)/dest
          export OPENSSL_PATH=$(brew --prefix openssl@3)

          # дё‹иЅЅж‰Ђжњ‰дѕќиµ–жєђз Ѓ
          git clone https://github.com/libimobiledevice/libplist.git
          git clone https://github.com/libimobiledevice/libusbmuxd.git
          git clone https://github.com/libimobiledevice/usbmuxd.git

          function build_dep() {
            local dir=$1
            local extra_args=$2
            cd "$dir"
            ./autogen.sh $extra_args \
              --enable-static --disable-shared \
              CFLAGS="-arch x86_64 -arch arm64 -mmacosx-version-min=12.0" \
              LDFLAGS="-arch x86_64 -arch arm64 -mmacosx-version-min=12.0"
            make -j$(sysctl -n hw.ncpu)
            make install
            cd ..
          }

          # зј–иЇ‘дѕќиµ–
          build_dep libplist "--prefix=$PREFIX"
          build_dep libusbmuxd "--prefix=$PREFIX --with-libplist=$PREFIX"
          
          # зј–иЇ‘ libimobiledevice
          ./autogen.sh --prefix=$PREFIX \
            --enable-static --disable-shared \
            --without-cython \
            CFLAGS="-arch x86_64 -arch arm64 -mmacosx-version-min=12.0 -I$PREFIX/include -I$OPENSSL_PATH/include" \
            LDFLAGS="-arch x86_64 -arch arm64 -mmacosx-version-min=12.0 -L$PREFIX/lib -L$OPENSSL_PATH/lib"

          make -j$(sysctl -n hw.ncpu)
          make install

          # ж‰“еЊ…
          zip -j libimobiledevice-macos-universal.zip $PREFIX/bin/* $PREFIX/sbin/*

      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: libimobiledevice-macos-universal
          path: "*.zip"
