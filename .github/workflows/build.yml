name: Build libimobiledevice (Intel + ARM + Universal)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # =========================
  # Step 1: Build x86 + arm
  # =========================
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]

    env:
      INSTALL_DIR: install

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew update
          brew install automake autoconf libtool pkg-config openssl libxml2 libzip

      - name: Set arch flags
        run: |
          echo "CFLAGS=-arch ${{ matrix.arch }}" >> $GITHUB_ENV
          echo "LDFLAGS=-arch ${{ matrix.arch }}" >> $GITHUB_ENV

      # ---------- libplist ----------
      - run: |
          git clone https://github.com/libimobiledevice/libplist.git
          cd libplist
          ./autogen.sh --prefix=$(pwd)/../${INSTALL_DIR}-${{ matrix.arch }} CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
          make -j$(sysctl -n hw.logicalcpu)
          make install

      # ---------- libusbmuxd ----------
      - run: |
          git clone https://github.com/libimobiledevice/libusbmuxd.git
          cd libusbmuxd
          ./autogen.sh --prefix=$(pwd)/../${INSTALL_DIR}-${{ matrix.arch }} CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
          make -j$(sysctl -n hw.logicalcpu)
          make install

      # ---------- glue ----------
      - run: |
          git clone https://github.com/libimobiledevice/libimobiledevice-glue.git
          cd libimobiledevice-glue
          ./autogen.sh --prefix=$(pwd)/../${INSTALL_DIR}-${{ matrix.arch }} CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
          make -j$(sysctl -n hw.logicalcpu)
          make install

      # ---------- libimobiledevice ----------
      - run: |
          cd $GITHUB_WORKSPACE
          ./autogen.sh --prefix=$(pwd)/${INSTALL_DIR}-${{ matrix.arch }} CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
          make -j$(sysctl -n hw.logicalcpu)
          make install

      # ---------- package ----------
      - name: Package
        run: |
          cd ${INSTALL_DIR}-${{ matrix.arch }}
          zip -r ../libimobiledevice-${{ matrix.arch }}.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libimobiledevice-${{ matrix.arch }}
          path: libimobiledevice-${{ matrix.arch }}.zip


  # =========================
  # Step 2: Create Universal
  # =========================
  universal:
    name: Build Universal Binary
    runs-on: macos-latest
    needs: build

    steps:
      - name: Download x86
        uses: actions/download-artifact@v4
        with:
          name: libimobiledevice-x86_64
          path: x86

      - name: Download arm
        uses: actions/download-artifact@v4
        with:
          name: libimobiledevice-arm64
          path: arm

      - name: Unzip
        run: |
          unzip x86/*.zip -d x86_out
          unzip arm/*.zip -d arm_out

      - name: Merge binaries (lipo)
        run: |
          mkdir universal

          # 复制目录结构
          cp -R x86_out/* universal/

          # 合并 bin + lib
          find x86_out -type f | while read file; do
            rel=${file#x86_out/}
            arm_file="arm_out/$rel"
            out_file="universal/$rel"

            if [ -f "$arm_file" ]; then
              file "$file" | grep -q "Mach-O" || continue

              mkdir -p "$(dirname "$out_file")"

              lipo -create "$file" "$arm_file" -output "$out_file" || true
            fi
          done

      - name: Package universal
        run: |
          cd universal
          zip -r ../libimobiledevice-universal.zip .

      - name: Upload universal
        uses: actions/upload-artifact@v4
        with:
          name: libimobiledevice-universal
          path: libimobiledevice-universal.zip
