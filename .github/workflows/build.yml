name: Build libimobiledevice (macOS 13+ Universal)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install autoconf automake libtool pkg-config openssl@3

      - name: Build full chain (x86_64 + arm64 → lipo merged)
        run: |
          set -e
          export MIN_VER="13.0"
          export PREFIX=$(pwd)/build
          export OPENSSL=$(brew --prefix openssl@3)

          # 下载依赖
          git clone https://github.com/libimobiledevice/libplist
          git clone https://github.com/libimobiledevice/libusbmuxd
          git clone https://github.com/libimobiledevice/usbmuxd

          # 编译函数
          build() {
            local ARCH=$1
            local SRC=$2
            local EXTRA=$3
            local DEST="$PREFIX/$ARCH"

            cd $SRC
            ./autogen.sh \
              --host="$ARCH-apple-darwin" \
              --prefix="$DEST" \
              --enable-static --disable-shared \
              --disable-tests \
              $EXTRA \
              CFLAGS="-arch $ARCH -mmacosx-version-min=$MIN_VER -I$DEST/include -I$OPENSSL/include" \
              LDFLAGS="-arch $ARCH -mmacosx-version-min=$MIN_VER -L$DEST/lib -L$OPENSSL/lib"

            make -j$(sysctl -n hw.logicalcpu)
            make install
            cd ..
          }

          # ========== 编译 arm64 ==========
          build arm64 libplist
          build arm64 libusbmuxd "--with-libplist=$PREFIX/arm64"
          build arm64 libimobiledevice "--without-cython"
          build arm64 usbmuxd "--with-libusbmuxd=$PREFIX/arm64"

          # ========== 编译 x86_64 ==========
          build x86_64 libplist
          build x86_64 libusbmuxd "--with-libplist=$PREFIX/x86_64"
          build x86_64 libimobiledevice "--without-cython"
          build x86_64 usbmuxd "--with-libusbmuxd=$PREFIX/x86_64"

          # ========== lipo 合并成双架构 ==========
          mkdir -p dist
          TOOLS=(
            idevice_id ideviceinfo idevicesyslog ideviceinstaller
            idevicebackup idevicedebug idevicediagnostics plistutil usbmuxd
          )

          for BIN in "${TOOLS[@]}"; do
            ARM="$PREFIX/arm64/bin/$BIN"
            AMD="$PREFIX/x86_64/bin/$BIN"
            if [ -f "$ARM" ] && [ -f "$AMD" ]; then
              lipo -create "$ARM" "$AMD" -o "dist/$BIN"
              chmod +x "dist/$BIN"
            fi

            ARM="$PREFIX/arm64/sbin/$BIN"
            AMD="$PREFIX/x86_64/sbin/$BIN"
            if [ -f "$ARM" ] && [ -f "$AMD" ]; then
              lipo -create "$ARM" "$AMD" -o "dist/$BIN"
              chmod +x "dist/$BIN"
            fi
          done

          # 打包
          zip -j libimobiledevice_mac13+.zip dist/*

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: libimobiledevice_mac13+
          path: "libimobiledevice_mac13+.zip"
